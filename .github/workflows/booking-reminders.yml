name: Promemoria prenotazioni

on:
  schedule:
    # Ogni giorno alle 07:00 UTC (~08-09 del mattino in Italia)
    - cron: '0 7 * * *'
  workflow_dispatch: {}

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installa dipendenze
        working-directory: studentato/scripts
        run: npm install
      - name: Invia i promemoria del giorno prima
        working-directory: studentato/scripts
        run: node send-reminders.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
