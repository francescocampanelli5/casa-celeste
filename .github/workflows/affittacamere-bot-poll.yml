name: Affittacamere — polling comandi bot Telegram

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

# Evita esecuzioni sovrapposte: se una run impiega più dei 5 minuti previsti,
# la successiva aspetta invece di rileggere/duplicare gli stessi messaggi.
concurrency:
  group: affittacamere-bot-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installa dipendenze
        working-directory: affittacamere/scripts
        run: npm install
      - name: Leggi eventuali comandi /nuova
        working-directory: affittacamere/scripts
        run: node telegram-bot-poll.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SITE_ORIGIN: https://lacasaceleste.it/affittacamere/
