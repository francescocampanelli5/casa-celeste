<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cancella prenotazione — Casa Celeste</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232C8FC9'/%3E%3Crect x='14' y='4' width='14' height='14' rx='4' fill='%23FFD24C'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=18">
</head>
<body>
<div class="page">
  <header class="header">
    <a href="index.html" class="logo">
      <span class="logo-dot logo-dot--blue"></span>
      <span class="logo-dot logo-dot--yellow"></span>
      <span class="logo-text">Casa Celeste</span>
    </a>
  </header>

  <section class="section">
    <div class="container container--narrow">
      <div class="eyebrow eyebrow--blue">Cancellazione prenotazione</div>
      <h1 class="h2" id="cancel-title">La tua prenotazione</h1>
      <p id="cancel-subtitle" style="color:var(--text-body); margin-bottom:24px;">Caricamento…</p>

      <div id="cancel-notice" style="display:none;" class="noservices-panel"></div>

      <div id="cancel-lookup-form" style="display:none;">
        <p style="color:var(--text-body); margin-bottom:16px;">Non hai più il link ricevuto via email? Inserisci questi dati esattamente come alla prenotazione e la ritroviamo per te.</p>
        <div class="contact-form">
          <div class="input-icon-group"><svg width="16" height="16"><use href="#icon-user"></use></svg><input type="text" placeholder="Nome e cognome" id="cancel-lookup-name"></div>
          <div class="input-icon-group"><svg width="16" height="16"><use href="#icon-mail"></use></svg><input type="email" placeholder="Email" id="cancel-lookup-email"></div>
          <label style="display:block; font-size:12.5px; font-weight:700; color:var(--text-muted, #6B7A8C); margin:12px 0 4px;">Data di check-in</label>
          <div class="input-icon-group"><svg width="16" height="16"><use href="#icon-calendar"></use></svg><input type="date" id="cancel-lookup-checkin"></div>
        </div>
        <div class="field-error" id="cancel-lookup-error" style="display:none; margin-top:10px;"></div>
        <button type="button" class="btn btn-primary" style="width:100%; margin-top:14px;" id="cancel-lookup-btn">Cerca la mia prenotazione</button>
      </div>

      <div id="cancel-details" style="display:none;">
        <div class="checkout-card">
          <div class="checkout-card-row"><svg width="16" height="16"><use href="#icon-house"></use></svg><span id="cancel-room-label"></span></div>
          <div class="checkout-card-row"><svg width="16" height="16"><use href="#icon-calendar"></use></svg><span id="cancel-dates-label"></span></div>
        </div>
        <div class="price-summary" id="cancel-refund-summary"></div>
        <div class="field-error" id="cancel-error" style="display:none; margin-bottom:14px;"></div>
        <button type="button" class="btn confirm-btn" style="background:#C4463C;" id="cancel-confirm-btn">Cancella la prenotazione e richiedi il rimborso</button>
        <p style="font-size:12px; color:var(--text-muted, #6B7A8C); margin-top:14px; text-align:center;">
          Rileggi le
          <button type="button" class="link-btn" style="display:inline; padding:0;" id="cancel-terms-link">Condizioni di soggiorno</button>
          prima di procedere: l'azione non è reversibile.
        </p>
      </div>

      <div id="cancel-success" style="display:none;" class="booking-success">
        <div class="success-icon"><svg width="26" height="26"><use href="#icon-check"></use></svg></div>
        <h4 class="success-title">Prenotazione cancellata</h4>
        <p class="success-text" id="cancel-success-text"></p>
      </div>
    </div>
  </section>
</div>
<svg style="display:none;">
  <symbol id="icon-house" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></symbol>
  <symbol id="icon-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></symbol>
  <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></symbol>
  <symbol id="icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.6"/><path d="M4.5 20c1.2-4 4-6 7.5-6s6.3 2 7.5 6"/></symbol>
  <symbol id="icon-mail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="5" width="19" height="14" rx="3"/><path d="M3.5 6.5 12 13l8.5-6.5"/></symbol>
</svg>
<script src="js/firebase-config.js?v=1"></script>
<script type="module" src="js/firebase-init.js?v=5"></script>
<script src="js/cancella.js?v=2" defer></script>
</body>
</html>
