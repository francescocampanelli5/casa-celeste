name: Affittacamere — recupera chat-id Telegram (manuale)

# Solo manuale: ogni persona da notificare manda prima /start al bot, poi si
# lancia questo workflow da Actions → "Run workflow" per leggere il suo
# chat-id dal log e copiarlo in dashboard (Impostazioni).
on:
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installa dipendenze
        working-directory: affittacamere/scripts
        run: npm install
      - name: Leggi i chat-id recenti
        working-directory: affittacamere/scripts
        run: node telegram-fetch-updates.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
